name: Update results
on:
  schedule:
    - cron: "0 2,8,14,20 * * *"
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build results.json
        run: node scripts/update_results.js
      - name: Commit if changed
        run: |
          git config user.name  "wc2026-bot"
          git config user.email "actions@users.noreply.github.com"
          git add results.json
          git diff --staged --quiet || git commit -m "Update results $(date -u +%FT%TZ)"
          git push
